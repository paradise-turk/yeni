<!DOCTYPE html>
<html lang="tr" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradise Türk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4a2b4d; --gold: #c28d75; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--primary); color: white; margin: 0; }
        .gold-text { color: var(--gold); }
        .card { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(194, 141, 117, 0.3); border-radius: 30px; }
        .word-image { width: 100%; height: 220px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; border: 2px solid var(--gold); }
        /* تصحيح عرض النص التركي */
        .turkish-text { direction: ltr !important; text-transform: none !important; font-family: Arial, sans-serif; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app" class="max-w-md mx-auto min-h-screen p-5">
        <header class="flex justify-between items-center py-5">
            <div class="text-xl font-bold uppercase">PARADISE <span class="gold-text">TÜRK</span></div>
            <div class="bg-white/10 px-4 py-1 rounded-full border border-white/20">
                <span id="score">0</span> 👑
            </div>
        </header>

        <div id="content"></div>
    </div>

    <script>
        const data = [
            {
                title: "المهن - Meslekler",
                words: [
                    { tr: "Çiftçi", ar: "مزارع", img: "https://images.pexels.com/photos/2123011/pexels-photo-2123011.jpeg?auto=compress&cs=tinysrgb&w=400" },
                    { tr: "Doktor", ar: "طبيب", img: "https://images.pexels.com/photos/40568/medical-appointment-doctor-healthcare-40568.jpeg?auto=compress&cs=tinysrgb&w=400" },
                    { tr: "Ressam", ar: "رسام", img: "https://images.pexels.com/photos/102127/pexels-photo-102127.jpeg?auto=compress&cs=tinysrgb&w=400" },
                    { tr: "Mühendis", ar: "مهندس", img: "https://images.pexels.com/photos/3184418/pexels-photo-3184418.jpeg?auto=compress&cs=tinysrgb&w=400" }
                ]
            }
        ];

        let currentIndex = 0;
        let score = parseInt(localStorage.getItem('p_score') || '0');

        function showWords() {
            const word = data[0].words[currentIndex];
            document.getElementById('content').innerHTML = `
                <div class="card p-6 text-center mt-10">
                    <img src="${word.img}" class="word-image" alt="word-img">
                    <div class="turkish-text text-4xl mb-2">${word.tr}</div>
                    <div class="text-xl text-gray-300 mb-6">${word.ar}</div>
                    
                    <button onclick="speak('${word.tr}')" class="bg-[#c28d75] w-14 h-14 rounded-full mx-auto mb-8 flex items-center justify-center text-2xl shadow-lg">🔊</button>
                    
                    <div class="flex gap-3">
                        <button onclick="prev()" class="flex-1 py-4 bg-white/5 rounded-2xl border border-white/10">السابق</button>
                        <button onclick="next()" class="flex-[2] py-4 bg-[#c28d75] text-purple-900 font-bold rounded-2xl">التالي</button>
                    </div>
                </div>
            `;
            document.getElementById('score').innerText = score;
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
        }

        function next() {
            score += 10;
            localStorage.setItem('p_score', score);
            if (currentIndex < data[0].words.length - 1) {
                currentIndex++;
                showWords();
            } else {
                alert("أحسنت! أنهيت المرحلة 👑");
                currentIndex = 0;
                showWords();
            }
        }

        function prev() {
            if (currentIndex > 0) {
                currentIndex--;
                showWords();
            }
        }

        // تشغيل الموقع
        showWords();
    </script>
</body>
</html>
