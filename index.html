<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradise Türk - تعلم اللغة التركية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #4a2b4d;
            --accent-gold: #c28d75;
            --soft-gold: #e5c3b3;
            --white: #ffffff;
        }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--primary-purple); color: var(--white); margin: 0; overflow-x: hidden; }
        .gold-gradient { background: linear-gradient(135deg, var(--accent-gold), var(--soft-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .bg-gold-gradient { background: linear-gradient(135deg, var(--accent-gold), var(--soft-gold)); }
        .category-card { transition: all 0.3s ease; border: 1px solid rgba(194, 141, 117, 0.3); cursor: pointer; }
        .category-card:hover { transform: translateY(-5px); border-color: var(--accent-gold); background-color: rgba(194, 141, 117, 0.1); }
        .word-image { width: 150px; height: 150px; object-fit: contain; margin: 0 auto 15px; border-radius: 15px; background: white; padding: 10px; }
        .hidden { display: none !important; }
        /* حماية النص التركي من التداخل */
        .tr-text { direction: ltr !important; unicode-bidi: isolate; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="loading-overlay" class="fixed inset-0 bg-[#4a2b4d] z-[300] flex flex-col justify-center items-center">
        <div class="text-6xl mb-4">👑</div>
        <h2 class="text-2xl font-bold gold-gradient uppercase">Paradise Türk</h2>
    </div>

    <div id="auth-overlay" class="hidden fixed inset-0 bg-[#4a2b4d] z-[200] flex justify-center items-center p-5">
        <div class="bg-white/5 border border-white/10 p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <div class="text-5xl mb-4">👑</div>
            <h2 class="text-xl font-bold gold-gradient mb-6 uppercase">دخول خاص لطلاب باراديس ترك</h2>
            <input type="email" id="user-email" placeholder="البريد الإلكتروني" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl mb-4 text-center text-white outline-none">
            <button onclick="verifyAccess()" id="login-btn" class="w-full bg-gold-gradient text-[#4a2b4d] font-bold py-3 rounded-xl">فتح البوابة</button>
            <p id="auth-msg" class="text-red-400 mt-4 text-sm hidden"></p>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col p-4 pb-20 hidden">
        <header class="flex justify-between items-center py-6">
            <div class="flex flex-col">
                <h1 class="text-2xl font-bold uppercase leading-none">PARADISE<span class="text-[#c28d75]">TÜRK</span></h1>
                <p class="text-[10px] text-gray-300 tracking-[0.2em]">LANGUAGE EDUCATION</p>
            </div>
            <div class="bg-white/10 p-2 rounded-full flex items-center gap-2 px-3 border border-white/20">
                <span class="text-sm font-bold" id="score-display">0</span>
                <span class="text-lg">👑</span>
            </div>
        </header>

        <main id="main-content" class="flex-grow"></main>

        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#3a223c] border-t border-white/10 p-3 flex justify-around items-center">
            <button onclick="showCategories()" class="flex flex-col items-center gap-1"><span class="text-xl">🏠</span><span class="text-[10px]">الرئيسية</span></button>
            <button onclick="alert('قريباً')" class="flex flex-col items-center gap-1 opacity-50"><span class="text-xl">👤</span><span class="text-[10px]">بروفايلي</span></button>
        </nav>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyt8Bx9uNuL0aplfRfUma4a2-FFzZOX9a7J3kDBZdsSSK1vF3S51FRS9bCXFmTJkwM5/exec";
        
        // أول 100 كلمة موزعة على أقسام مع روابط صور واقعية
        const data = [
            { id: "numbers", title: "الأرقام", icon: "🔢", words: [
                { tr: "Bir", ar: "واحد", img: "https://cdn-icons-png.flaticon.com/512/3841/3841665.png" },
                { tr: "İki", ar: "اثنان", img: "https://cdn-icons-png.flaticon.com/512/3841/3841671.png" },
                { tr: "Üç", ar: "ثلاثة", img: "https://cdn-icons-png.flaticon.com/512/3841/3841677.png" },
                { tr: "Dört", ar: "أربعة", img: "https://cdn-icons-png.flaticon.com/512/3841/3841684.png" },
                { tr: "Beş", ar: "خمسة", img: "https://cdn-icons-png.flaticon.com/512/3841/3841691.png" }
            ]},
            { id: "jobs", title: "المهن", icon: "💼", words: [
                { tr: "Doktor", ar: "طبيب", img: "https://cdn-icons-png.flaticon.com/512/3774/3774299.png" },
                { tr: "Öğretmen", ar: "معلم", img: "https://cdn-icons-png.flaticon.com/512/3429/3429433.png" },
                { tr: "Mühendis", ar: "مهندس", img: "https://cdn-icons-png.flaticon.com/512/2942/2942503.png" },
                { tr: "Çiftçi", ar: "مزارع", img: "https://cdn-icons-png.flaticon.com/512/1995/1995471.png" },
                { tr: "Aşçı", ar: "طباخ", img: "https://cdn-icons-png.flaticon.com/512/1830/1830335.png" }
            ]}
            // سأضيف لكِ باقي الـ 100 كلمة هنا في الرد القادم لكي لا يطول الكود جداً
        ];

        let currentScore = parseInt(localStorage.getItem('paradise_score') || '0');
        
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading-overlay').classList.add('hidden');
                if(localStorage.getItem('paradise_access_granted')) {
                    document.getElementById('app').classList.remove('hidden');
                    showCategories();
                } else {
                    document.getElementById('auth-overlay').classList.remove('hidden');
                }
            }, 2000);
            document.getElementById('score-display').innerText = currentScore;
        };

        async function verifyAccess() {
            const email = document.getElementById('user-email').value.trim().toLowerCase();
            if(!email) return alert("أدخل البريد");
            document.getElementById('login-btn').innerText = "جاري التحقق...";
            try {
                const res = await fetch(`${SCRIPT_URL}?email=${encodeURIComponent(email)}`);
                const result = await res.json();
                if(result.status === "success") {
                    localStorage.setItem('paradise_access_granted', 'true');
                    location.reload();
                } else {
                    document.getElementById('auth-msg').innerText = "البريد غير مسجل";
                    document.getElementById('auth-msg').classList.remove('hidden');
                }
            } catch (e) { alert("خطأ في الاتصال"); }
            document.getElementById('login-btn').innerText = "فتح البوابة";
        }

        function showCategories() {
            let html = `<div class="grid grid-cols-2 gap-4 mt-6">`;
            data.forEach(cat => {
                html += `
                    <div onclick="showFlashcards('${cat.id}')" class="category-card p-6 rounded-3xl text-center bg-white/5">
                        <div class="text-4xl mb-3">${cat.icon}</div>
                        <div class="font-bold text-sm">${cat.title}</div>
                        <div class="text-[10px] text-gray-400 mt-1">${cat.words.length} كلمات</div>
                    </div>`;
            });
            html += `</div>`;
            document.getElementById('main-content').innerHTML = html;
        }

        function showFlashcards(catId) {
            const cat = data.find(c => c.id === catId);
            let index = 0;
            renderCard(cat.words, index);
        }

        function renderCard(words, idx) {
            const word = words[idx];
            document.getElementById('main-content').innerHTML = `
                <div class="mt-10 p-8 rounded-[40px] bg-white/10 text-center border border-white/20">
                    <img src="${word.img}" class="word-image" alt="img">
                    <div class="tr-text text-4xl font-bold mb-2">${word.tr}</div>
                    <div class="text-xl text-gray-300 mb-8">${word.ar}</div>
                    <button onclick="speak('${word.tr}')" class="bg-gold-gradient p-4 rounded-full mb-6">🔊</button>
                    <div class="flex justify-between gap-4 mt-4">
                        ${idx > 0 ? `<button onclick="renderCard(null, ${idx-1})" class="flex-1 py-3 border border-white/20 rounded-xl">السابق</button>` : ''}
                        <button onclick="nextWord(${idx}, ${words.length})" class="flex-[2] py-3 bg-gold-gradient text-purple-900 font-bold rounded-xl">التالي</button>
                    </div>
                </div>
            `;
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'tr-TR';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        function nextWord(idx, total) {
            updateScore(10);
            if(idx < total - 1) {
                // العودة للـ renderCard مع الكلمات
            } else {
                showCategories();
            }
        }

        function updateScore(p) {
            currentScore += p;
            localStorage.setItem('paradise_score', currentScore);
            document.getElementById('score-display').innerText = currentScore;
        }
    </script>
</body>
</html>
