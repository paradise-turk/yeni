<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradise Türk - تعلم اللغة التركية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #4a2b4d;
            --accent-gold: #c28d75;
            --soft-gold: #e5c3b3;
            --white: #ffffff;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--primary-purple);
            color: var(--white);
            margin: 0;
            overflow-x: hidden;
        }

        .gold-gradient {
            background: linear-gradient(135deg, var(--accent-gold), var(--soft-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bg-gold-gradient {
            background: linear-gradient(135deg, var(--accent-gold), var(--soft-gold));
        }

        .card-shadow {
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .category-card {
            transition: all 0.3s ease;
            border: 1px solid rgba(194, 141, 117, 0.3);
        }

        .category-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            background-color: rgba(194, 141, 117, 0.1);
        }

        .btn-bounce:active {
            transform: scale(0.95);
        }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .crown-icon {
            animation: floating 3s ease-in-out infinite;
        }

        #auth-overlay, #loading-overlay {
            background: var(--primary-purple);
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--accent-gold);
            border-radius: 10px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="text-center">
            <div class="crown-icon text-6xl mb-4">👑</div>
            <h2 class="text-2xl font-bold gold-gradient tracking-widest uppercase">Paradise Türk</h2>
        </div>
    </div>

    <div id="auth-overlay" class="hidden">
        <div class="bg-white/5 border border-white/10 p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center card-shadow">
            <div class="crown-icon text-5xl mb-4">👑</div>
            <h2 class="text-xl font-bold gold-gradient mb-2 uppercase">دخول خاص لطلاب باراديس ترك فقط</h2>
            <p class="text-gray-400 text-sm mb-6">أدخل البريد المسجل لتفعيل رحلتك</p>
            
            <input type="email" id="user-email" placeholder="البريد الإلكتروني" 
                   class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl mb-4 text-center text-white focus:border-accent-gold outline-none shadow-inner">
            
            <button onclick="verifyAccess()" id="login-btn" class="w-full bg-gold-gradient text-[#4a2b4d] font-bold py-3 rounded-xl btn-bounce shadow-lg">
                فتح البوابة
            </button>
            
            <p id="auth-msg" class="text-red-400 mt-4 text-sm font-bold hidden"></p>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col p-4 pb-20 hidden">
        
        <header class="flex justify-between items-center py-6">
            <div class="flex flex-col">
                <h1 class="text-2xl font-bold tracking-tighter uppercase leading-none">PARADISE<span class="text-[#c28d75]">TÜRK</span></h1>
                <p class="text-[10px] text-gray-300 tracking-[0.2em]">LANGUAGE EDUCATION</p>
            </div>
            <div class="bg-white/10 p-2 rounded-full flex items-center gap-2 px-3 border border-white/20">
                <span class="text-sm font-bold" id="score-display">0</span>
                <span class="text-lg">👑</span>
            </div>
        </header>

        <main id="main-content" class="flex-grow"></main>

        <nav id="footer-nav" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#3a223c] border-t border-white/10 p-3 flex justify-around items-center">
            <button onclick="showCategories()" id="nav-home" class="flex flex-col items-center gap-1 opacity-100 text-[#c28d75]">
                <span class="text-xl">🏠</span>
                <span class="text-[10px]">الرئيسية</span>
            </button>
            <button onclick="showProfile()" id="nav-profile" class="flex flex-col items-center gap-1 opacity-50">
                <span class="text-xl">👤</span>
                <span class="text-[10px]">بروفايلي</span>
            </button>
        </nav>
    </div>

     data.forEach(category => {
    if (category.icon.startsWith('http')) {
        category.icon = `<img src="${category.icon}" style="width:1.4em; height:1.4em; vertical-align:middle; object-fit:contain;">`;
    }
    category.words.forEach(word => {
        if (word.img.startsWith('http')) {

        let currentScore = parseInt(localStorage.getItem('paradise_score') || '0');
        const mainContent = document.getElementById('main-content');
        const scoreDisplay = document.getElementById('score-display');

        async function verifyAccess() {
            const emailInput = document.getElementById('user-email').value.trim().toLowerCase();
            const btn = document.getElementById('login-btn');
            const msg = document.getElementById('auth-msg');

            if(!emailInput) return alert("لطفاً أدخل البريد الإلكتروني");

            btn.innerText = "جاري التحقق...";
            btn.disabled = true;

            try {
                const response = await fetch(`${SCRIPT_URL}?email=${encodeURIComponent(emailInput)}&t=${new Date().getTime()}`);
                const result = await response.json();

                if (result.status === "success") {
                    localStorage.setItem('paradise_access_granted', 'true');
                    document.getElementById('auth-overlay').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    showCategories();
                } else {
                    msg.innerText = "هذا البريد غير مسجل كطالب VIP.";
                    msg.classList.remove('hidden');
                }
            } catch (error) {
                msg.innerText = "خطأ في الاتصال. تأكدي من تفعيل الـ Web App.";
                msg.classList.remove('hidden');
            } finally {
                btn.innerText = "فتح البوابة";
                btn.disabled = false;
            }
        }

        function updateScore(points) {
            currentScore += points;
            localStorage.setItem('paradise_score', currentScore);
            scoreDisplay.innerText = currentScore;

            if (currentScore > 0 && currentScore % 500 === 0) {
                setTimeout(showFinalVictory, 1200);
            }
        }

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'tr-TR'; 
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        function showMessage(type, text) {
            const box = document.getElementById('msg-box');
            const icon = document.getElementById('msg-icon');
            const txt = document.getElementById('msg-text');
            box.classList.remove('hidden');
            box.className = `fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 p-6 rounded-2xl z-50 text-center card-shadow min-w-[200px] ${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white`;
            icon.innerText = type === 'success' ? "👑" : "❌";
            txt.innerText = text;
            setTimeout(() => box.classList.add('hidden'), 1500);
        }

        function showCategories() {
            scoreDisplay.innerText = currentScore;
            updateNav('home');
            mainContent.innerHTML = `
                <div class="mb-6 mt-4">
                    <h2 class="text-xl font-bold mb-1">اختر موضوعاً</h2>
                    <p class="text-gray-400 text-sm">ابدأ رحلة التعلم واحصد التيجان (50 موضوع)</p>
                </div>
                <div class="grid grid-cols-2 gap-4 pb-12 custom-scrollbar overflow-y-auto max-h-[70vh]">
                    ${data.map(cat => `
                        <div onclick="startLesson('${cat.id}')" class="category-card rounded-2xl p-6 flex flex-col items-center justify-center text-center cursor-pointer bg-white/5">
                            <span class="text-4xl mb-3">${cat.icon}</span>
                            <span class="font-bold text-sm">${cat.title}</span>
                            <span class="text-[10px] mt-2 text-gray-400">10 كلمات</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function startLesson(catId) {
            const category = data.find(c => c.id === catId);
            let wordIndex = 0;
            const renderWord = () => {
                const word = category.words[wordIndex];
                mainContent.innerHTML = `
                    <div class="flex items-center gap-2 mb-8">
                        <button onclick="showCategories()" class="text-xl">←</button>
                        <h2 class="text-lg font-bold">${category.title}</h2>
                        <div class="flex-grow bg-white/10 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-gold-gradient h-full transition-all duration-500" style="width: ${((wordIndex+1)/10)*100}%"></div>
                        </div>
                        <span class="text-[10px] opacity-50">${wordIndex+1}/10</span>
                    </div>
                    <div class="flex flex-col items-center text-center">
                        <div class="w-48 h-48 bg-white/5 rounded-3xl flex items-center justify-center text-7xl mb-8 card-shadow border border-white/10">
                            ${word.img}
                        </div>
                        <h3 class="text-4xl font-bold tracking-wider mb-2 gold-gradient">${word.tr}</h3>
                        <p class="text-xl text-gray-300 mb-8">${word.ar}</p>
                        <button onclick="speak('${word.tr}')" class="bg-white/10 w-16 h-16 rounded-full flex items-center justify-center mb-12 hover:bg-white/20">
                            <span class="text-2xl">🔊</span>
                        </button>
                        <div class="grid grid-cols-1 gap-4 w-full">
                            <button onclick="checkAnswer('${word.tr}')" class="bg-gold-gradient text-[#4a2b4d] font-bold py-4 rounded-xl btn-bounce shadow-lg">تخطي / التالي</button>
                        </div>
                    </div>
                `;
            };
            window.checkAnswer = (correct) => {
                updateScore(1);
                showMessage('success', 'رائع! +1 تاج');
                speak(correct);
                setTimeout(() => {
                    wordIndex++;
                    if(wordIndex < 10) renderWord();
                    else showCompletion(category.title);
                }, 1000);
            };
            renderWord();
        }

        function showCompletion(title) {
            mainContent.innerHTML = `
                <div class="flex flex-col items-center justify-center text-center py-12">
                    <div class="crown-icon text-9xl mb-6">👑</div>
                    <h2 class="text-3xl font-bold mb-4 gold-gradient">أحسنت يا بطل!</h2>
                    <p class="text-gray-300 mb-8 px-6">لقد أتممت موضوع (${title}) بنجاح.</p>
                    <button onclick="showCategories()" class="bg-gold-gradient text-[#4a2b4d] font-bold px-12 py-4 rounded-xl shadow-lg">العودة للرئيسية</button>
                </div>
            `;
        }

        function showFinalVictory() {
            mainContent.innerHTML = `
                <div class="flex flex-col items-center justify-center text-center py-12 px-6">
                    <div class="crown-icon text-9xl mb-6">🏆</div>
                    <h2 class="text-3xl font-bold mb-4 gold-gradient">إنجاز القاموس الذهبي!</h2>
                    <p class="text-gray-300 mb-8 leading-relaxed">
                        لقد لمست الآن جميع الكلمات الـ 500! <br>
                        تيجانك الآن هي <span class="text-white font-bold">${currentScore}</span>. <br>
                        استمر في حصد التيجان لتثبيت الكلمات في ذاكرتك للأبد والوصول لرتبة "السلطان اللغوي".
                    </p>
                    <button onclick="showCategories()" class="bg-gold-gradient text-[#4a2b4d] font-bold px-12 py-4 rounded-xl shadow-lg btn-bounce">
                        متابعة الرحلة نحو القمة
                    </button>
                </div>
            `;
        }

        function showProfile() {
            updateNav('profile');
            mainContent.innerHTML = `
                <div class="py-8">
                    <div class="flex flex-col items-center mb-10">
                        <div class="w-24 h-24 rounded-full bg-gold-gradient flex items-center justify-center text-4xl mb-4 text-[#4a2b4d] font-bold">P</div>
                        <h2 class="text-xl font-bold gold-gradient uppercase">Paradis</h2>
                        <p class="text-sm text-gray-400 tracking-widest uppercase">Paradise Türk Student</p>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-6 mb-4 flex justify-between items-center border border-white/10">
                        <div>
                            <p class="text-xs text-gray-400">إجمالي التيجان</p>
                            <p class="text-2xl font-bold gold-gradient">${currentScore} 👑</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs text-gray-400">المستوى</p>
                            <p class="font-bold">${currentScore > 400 ? 'أستاذ' : currentScore > 200 ? 'متقدم' : 'مبتدئ'}</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-4 rounded-xl text-center border border-white/5">
                            <span class="block text-2xl mb-1">🎯</span>
                            <span class="text-[10px] text-gray-400 uppercase">المواضيع</span>
                            <span class="block font-bold">${Math.floor(currentScore/10)} / 50</span>
                        </div>
                        <div class="bg-white/5 p-4 rounded-xl text-center border border-white/5">
                            <span class="block text-2xl mb-1">🏅</span>
                            <span class="text-[10px] text-gray-400 uppercase">الكلمات</span>
                            <span class="block font-bold">${currentScore} / 500</span>
                        </div>
                    </div>
                    <button onclick="logout()" class="w-full mt-8 text-red-400 text-sm opacity-50">تسجيل الخروج</button>
                </div>
            `;
        }

        function updateNav(page) {
            const home = document.getElementById('nav-home');
            const profile = document.getElementById('nav-profile');
            if(page === 'home') {
                home.className = "flex flex-col items-center gap-1 text-[#c28d75]";
                profile.className = "flex flex-col items-center gap-1 opacity-50";
            } else {
                profile.className = "flex flex-col items-center gap-1 text-[#c28d75]";
                home.className = "flex flex-col items-center gap-1 opacity-50";
            }
        }

        function logout() {
            localStorage.removeItem('paradise_access_granted');
            location.reload();
        }

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
                if (localStorage.getItem('paradise_access_granted') === 'true') {
                    document.getElementById('app').classList.remove('hidden');
                    showCategories();
                } else {
                    document.getElementById('auth-overlay').classList.remove('hidden');
                }
            }, 1500);
        };
    </script>
